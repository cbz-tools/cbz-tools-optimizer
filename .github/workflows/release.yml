name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI (release)
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: link.exe
        run: cargo build --release --target x86_64-pc-windows-msvc -p cbz-image-optimizer-cli

      - name: Build GUI (release)
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: link.exe
        run: cargo build --release --target x86_64-pc-windows-msvc -p cbz-image-optimizer-gui

      - name: Package artifacts
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $dir = "cbz-image-optimizer-$tag-windows-x64"
          New-Item -ItemType Directory -Path $dir

          Copy-Item target/x86_64-pc-windows-msvc/release/cbz-image-optimizer.exe     $dir/
          Copy-Item target/x86_64-pc-windows-msvc/release/cbz-image-optimizer-gui.exe $dir/
          Copy-Item README.md  $dir/
          Copy-Item LICENSE    $dir/

          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          draft: false

  build-linux:
    name: Build Linux (CLI only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: sudo apt-get install -y libssl-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release -p cbz-image-optimizer-cli

      - name: Package
        run: |
          tag="${{ github.ref_name }}"
          dir="cbz-image-optimizer-${tag}-linux-x64"
          mkdir "$dir"
          cp target/release/cbz-image-optimizer "$dir/"
          cp README.md LICENSE "$dir/"
          tar czf "${dir}.tar.gz" "$dir"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"

  build-macos:
    name: Build macOS (CLI only)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release -p cbz-image-optimizer-cli

      - name: Package
        run: |
          tag="${{ github.ref_name }}"
          dir="cbz-image-optimizer-${tag}-macos-x64"
          mkdir "$dir"
          cp target/release/cbz-image-optimizer "$dir/"
          cp README.md LICENSE "$dir/"
          tar czf "${dir}.tar.gz" "$dir"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
